<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eurotrasz EPG Viewer</title>
<style>
  body { font-family: Arial; background:#111; color:#eee; }
  h1, h3, p { text-align:center; }
  table { width:80%; border-collapse:collapse; margin:auto; }
  th, td { border:1px solid #333; padding:6px; }
  th { background:#222; }
</style>
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
</head>
<body>

<h1>📺 Eurotrasz EPG Viewer</h1>
<h3>A simple viewer to view XML EPGs</h3>

<label for="searchInput" style="display:block;text-align:center;">Search channel or programs:</label><br>
<input type="text" id="searchInput" placeholder="Enter keyword..." size="40" style="display:block;margin:auto;"><br>

<table id="guide">
  <thead>
    <tr>
      <th width="20%">Channel</th>
      <th width="80%">Programs</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const guide = document.querySelector("#guide tbody");

const sources = [
  { name: "MJH Pluto", url: "https://raw.githubusercontent.com/matthuisman/i.mjh.nz/refs/heads/master/PlutoTV/all.xml" },
  { name: "MJH All", url: "https://i.mjh.nz/au/all/epg.xml" },
  { name: "BuddyChewChew Tubi", url: "https://raw.githubusercontent.com/BuddyChewChew/app-m3u-generator/main/playlists/tubi_epg.xml" },
  { name: "MJH Roku", url: "https://github.com/matthuisman/i.mjh.nz/raw/master/Roku/all.xml" },
  { name: "Buddy LG", url: "https://github.com/BuddyChewChew/lg-playlist-generator/raw/refs/heads/main/lg_channels_us.xml" },
  { name: "MJH Samsung", url: "https://raw.githubusercontent.com/matthuisman/i.mjh.nz/refs/heads/master/SamsungTVPlus/all.xml" },
  { name: "Buddy Samsung", url: "https://github.com/BuddyChewChew/samsungtvplus/raw/refs/heads/main/output/samsung_tvplus.xml" },
  { name: "Eurotrasz", url: "https://raw.githubusercontent.com/Eurotrasz/australia-epg/refs/heads/main/au_epg.xml" }
];

let channelMap = {};
let channels = {};
let allChannelKeys = [];
let searchTerm = "";

document.getElementById("searchInput").addEventListener("input", e => {
  searchTerm = e.target.value.toLowerCase();
  render();
});

async function loadAll() {
  for (const src of sources) {
    try {
      const res = await fetch(src.url);
      let xmlText;

      if (src.url.endsWith(".gz")) {
        const buffer = await res.arrayBuffer();
        xmlText = pako.ungzip(new Uint8Array(buffer), { to: 'string' });
      } else {
        xmlText = await res.text();
      }

      parseXML(xmlText);
      console.log("Loaded:", src.name);
    } catch (err) {
      console.error("Failed:", src.name, err);
    }
  }

  allChannelKeys = Object.keys(channelMap).sort((a,b)=>
    (channelMap[a]?.name||a).localeCompare(channelMap[b]?.name||b)
  );

  render();
}

function parseXML(xmlText) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, "text/xml");

  [...xml.getElementsByTagName("channel")].forEach(ch=>{
    const id = ch.getAttribute("id")?.trim().toLowerCase();
    if (!channelMap[id]) {
      const name = ch.getElementsByTagName("display-name")[0]?.textContent || id;
      const icon = ch.getElementsByTagName("icon")[0]?.getAttribute("src") || null;
      channelMap[id] = { name, icon };
    }
  });

  [...xml.getElementsByTagName("programme")].forEach(p=>{
    const channel = p.getAttribute("channel")?.trim().toLowerCase();
    const title = p.getElementsByTagName("title")[0]?.textContent || "No title";
    const desc = p.getElementsByTagName("desc")[0]?.textContent || "";
    const startDate = parseXMLTVTime(p.getAttribute("start"));
    const stopDate = parseXMLTVTime(p.getAttribute("stop"));

    if (!channels[channel]) channels[channel] = [];
    channels[channel].push({ title, desc, startDate, stopDate });
  });
}

function parseXMLTVTime(timeStr) {
  const main = timeStr.slice(0,14);
  const tz = timeStr.slice(14).trim() || "+0000";

  const y = +main.slice(0,4);
  const m = +main.slice(4,6)-1;
  const d = +main.slice(6,8);
  const h = +main.slice(8,10);
  const min = +main.slice(10,12);
  const s = +main.slice(12,14);

  let date = new Date(Date.UTC(y,m,d,h,min,s));

  const sign = tz[0] === "+" ? 1 : -1;
  const tzH = +tz.slice(1,3);
  const tzM = +tz.slice(3,5);

  return new Date(date.getTime() - sign*(tzH*60+tzM)*60000);
}

function formatTime(date) {
  let hh = date.getHours();
  const mm = date.getMinutes().toString().padStart(2,"0");
  const ampm = hh>=12?"PM":"AM";
  hh = hh%12 || 12;
  return `${hh}:${mm} ${ampm}`;
}

function render() {
  guide.innerHTML = "";
  const now = new Date();
  const fragment = document.createDocumentFragment();

  const filteredChannels = allChannelKeys.filter(ch => {
    if (!searchTerm) return true;

    const info = channelMap[ch];
    const progList = channels[ch] || [];

    const nameMatch = info?.name?.toLowerCase().includes(searchTerm);

const programmeMatch = progList.some(p =>
  p.title.toLowerCase().includes(searchTerm)
);

    return nameMatch || programmeMatch;
  });

  for (const ch of filteredChannels) {
    const info = channelMap[ch];
    const progList = channels[ch] || [];

    const nameMatch = info?.name?.toLowerCase().includes(searchTerm);

const filteredProgs = searchTerm
  ? nameMatch
    ? progList // 👈 show ALL if channel name matches
    : progList.filter(p =>
  p.title.toLowerCase().includes(searchTerm)
)
  : progList;

    const row = document.createElement("tr");

    const nameCell = document.createElement("td");
    nameCell.textContent = info.name;

    const progCell = document.createElement("td");

    if (filteredProgs.length === 0) {
      progCell.textContent = searchTerm
        nameMatch ? "Loading programmes..." : "No matching programmes";
    } else {
      filteredProgs.forEach(p => {
        const div = document.createElement("div");
        div.innerHTML = `<strong>${formatTime(p.startDate)}</strong> - ${p.title}`;

        if (p.startDate && p.stopDate && now >= p.startDate && now < p.stopDate) {
          div.style.backgroundColor = "#480000";
          div.style.fontWeight = "bold";
        }

        progCell.appendChild(div);
      });
    }

    row.appendChild(nameCell);
    row.appendChild(progCell);
    fragment.appendChild(row);
  }

  guide.appendChild(fragment);
}

loadAll();
</script>

<p>If you use this viewer, credit: https://github.com/Eurotrasz</p>

</body>
</html>
